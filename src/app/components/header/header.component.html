<!-- =============================================
     КОМПОНЕНТ HEADER – навігаційна панель
     ============================================= -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top" [class.scrolled]="isScrolled">
  <div class="container">
    <!-- Логотип / бренд -->
    <a class="navbar-brand brand" routerLink="/home">
      <span class="brand-icon">✈</span>
      <span class="brand-text">Wanderlust</span>
    </a>

    <!-- Кнопка мобільного меню -->
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarMain"
            aria-controls="navbarMain"
            aria-expanded="false"
            aria-label="Відкрити меню">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Пункти меню -->
    <div class="collapse navbar-collapse" id="navbarMain">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">
        <li class="nav-item">
          <a class="nav-link"
             routerLink="/home"
             routerLinkActive="active">Головна</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
             routerLink="/tours"
             routerLinkActive="active">Тури</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
             routerLink="/services"
             routerLinkActive="active">Сервіси</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
             routerLink="/about"
             routerLinkActive="active">Про нас</a>
        </li>
        <li class="nav-item ms-lg-3">
          <button class="btn btn-wanderlust nav-cta"
        [routerLink]="['/booking']">
        Забронювати
        </button>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!-- Відступ під fixed navbar -->
<div class="navbar-spacer"></div>
