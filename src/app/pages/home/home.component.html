<!-- =============================================
     СТОРІНКА "ГОЛОВНА" – маршрут /home
     ============================================= -->
<main>
  <app-carousel></app-carousel>

  <!-- Секція "Популярні напрямки" -->
  <section class="section text-center">
    <div class="container">
      <h2 class="section-title">Популярні напрямки</h2>
      <p class="section-subtitle">Відкрийте для себе найкращі куточки планети</p>
      <div class="row g-4">
        <div class="col-md-4" *ngFor="let dest of destinations">
          <div class="card card-wanderlust h-100" appHighlightCard>
            <div class="card-img-placeholder" [style.background]="dest.color">
              <span class="dest-emoji">{{ dest.emoji }}</span>
            </div>
            <div class="card-body text-start p-4">
              <h5 class="card-title mb-1">{{ dest.name }}</h5>
              <p class="card-country text-muted mb-2">{{ dest.country }}</p>
              <p class="card-text">{{ dest.description }}</p>
              <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="price">від <strong>{{ dest.price }}</strong></span>
                <a routerLink="/tours" class="btn btn-wanderlust btn-sm">Деталі</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Секція "Чому ми" -->
  <section class="section why-us-section">
    <div class="container">
      <h2 class="section-title text-center">Чому обирають нас</h2>
      <p class="section-subtitle text-center">Тисячі задоволених мандрівників довіряють Wanderlust</p>
      <div class="row g-4 text-center">
        <div class="col-md-3" *ngFor="let f of features">
          <div class="feature-box">
            <div class="feature-icon">{{ f.icon }}</div>
            <h5>{{ f.title }}</h5>
            <p>{{ f.text }}</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
